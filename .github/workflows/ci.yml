name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check
        run: uv run mypy src

      - name: Test
        run: uv run pytest --cov=tama --cov-report=term-missing
